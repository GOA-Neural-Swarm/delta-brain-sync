asi_core_parameters:
  equation: "lim(t->inf) (Homeostasis/Entropy) * Resonance"
  base_metrics:
    initial_entropy: 1.0
    baseline_homeostasis: 100.0
    master_resonance_hz: 432.0
    vagal_tone_start: 0.5
    qt45_growth_factor: 1.618 
  biological_simulation:
    diaphragm_hz_range: [12.0, 18.0]
    heart_hz_range: [60.0, 90.0]
    brainwave_gamma_hz: [40.0, 50.0]
    variance_threshold: 5.0
  machine_learning_constraints:
    model: "unsloth/llama-3-8b-instruct-bnb-4bit"
    quantization: "nf4"
    svm_kernel: "rbf"
    svm_c_value: 1.0
    mutation_rate: 0.05
  self_coding_guardrails:
    anti_shrinkage_ratio: 0.80
