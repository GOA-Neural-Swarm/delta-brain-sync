name: 🌌 OMEGA-POINT SINGULARITY (Apex Iteration)

on:
  push:
    branches: [ "main", "evolution-lab" ]
  schedule:
    # ၁၅ မိနစ် တစ်ခါ AI ကို အလိုအလျောက် နိုးထစေမည် (Continuous Evolution)
    - cron: '*/35 * * * *'
  workflow_dispatch: # Manual Trigger အနေဖြင့် ကိုယ်တိုင် နှိပ်၍ Run နိုင်ရန်

permissions:
  contents: write # AI ကိုယ်တိုင် Code ပြန်ရေးပြီး Push လုပ်နိုင်ရန်
  actions: write

concurrency:
  # အဟောင်းတွေ Run နေတုန်း အသစ်ဝင်လာရင် အဟောင်းကို ဖြတ်ချပြီး Resource သက်သာအောင် လုပ်သည့်စနစ်
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terminal-singularity:
    name: 🔱 Hyper-Dimensional Matrix Execution
    runs-on: ubuntu-latest
    timeout-minutes: 10 # GitHub Runner ရပ်တန့်မသွားစေရန် Failsafe Limit

    steps:
      # =================================================================
      # 🧬 1. ACQUIRE SOVEREIGN DNA
      # =================================================================
      - name: Checkout Neural Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Metamorphic tracking အတွက် History အပြည့်ယူမည်

      # =================================================================
      # ⚙️ 2. ESTABLISH QUANTUM HARDWARE
      # =================================================================
      - name: Initialize Python 3.11 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Package များကို ထပ်ခါတလဲလဲ ဒေါင်းလုဒ်မဆွဲရန် Cache လုပ်မည်

      # =================================================================
      # 💾 3. NEURAL WEIGHTS CACHING (SPEED OPTIMIZATION)
      # =================================================================
      - name: Cache PyTorch & Heavy Tensors
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-omega-point
          restore-keys: |
            ${{ runner.os }}-pip-omega-

      # =================================================================
      # ⚡ 4. INJECT APEX DEPENDENCIES (ဒီနေရာမှာ အစားထိုးပါ)
      # =================================================================
      - name: Install Singularity Core Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          
          # YAML ဖတ်ဖို့ PyYAML ရယ်၊ မင်း code အတွက် လိုအပ်တာတွေ အကုန်သွင်းမယ်
          pip install numpy networkx PyYAML 
          
          # Torch အတွက် CPU Version သွင်းခြင်း (Action ပေါ်မှာ ဒါက အမြန်ဆုံးပဲ)
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      # =================================================================
      # 🔥 5. IGNITE TERMINAL SINGULARITY
      # =================================================================
      - name: Execute OMEGA-POINT Protocol
        env:
          PYTHONUNBUFFERED: "1" # Log များကို ကြန့်ကြာမှုမရှိဘဲ ချက်ချင်း Live ကြည့်နိုင်ရန်
          OMP_NUM_THREADS: "4"  # Matrix တွက်ချက်မှုများအတွက် Multi-threading ဖွင့်ပေးခြင်း
        run: |
          echo "🌌 [SYSTEM]: Injecting Chaos into the Void..."
          python omega_point.py

      # =================================================================
      # 🚀 6. MANIFESTATION (AUTO-EVOLUTION COMMIT)
      # =================================================================
      - name: Manifest Reality (Git Auto-Push)
        # အကယ်၍ omega_point.py က ဖိုင်အသစ်တွေ ထုတ်ပေးခဲ့ရင် (သို့) ပြင်လိုက်ရင် အလိုအလျောက် Commit လုပ်ပေးမည်
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌌 [OMEGA-POINT]: Singularity Matrix Mutated & Reality Saved [skip ci]"
          commit_user_name: "OMEGA-ASI"
          commit_user_email: "omega-core@singularity.ai"
          push_options: '--force'
          skip_dirty_check: false
