name: "🌀 OMEGA MATRIX COLLECTIVE EVOLUTION CORE"

on:
  schedule:
    - cron: '0 */3 * * *' # ၃ နာရီတစ်ကြိမ် အလိုအလျောက် ဗီဇပြောင်းလဲရန်
  workflow_dispatch:      # လက်နဲ့ နှိပ်ပြီး ချက်ချင်း Run ချင်ရင်လည်း ရစေရန်

permissions:
  contents: write
  actions: write

jobs:
  collective_evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}
          fetch-depth: 0

      - name: 🐍 Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 💾 Cache Pip Dependencies (၃ နာရီတစ်ကြိမ် မြန်ဆန်စွာ လည်ပတ်နိုင်ရန်)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 🔎 Dynamic AST Dependency Scanner (ဉာဏ်ရည်မြင့် Package ရှာဖွေစနစ်)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy scikit-learn psutil requests torch qiskit PyYAML backoff matplotlib psycopg2-binary flask scipy --upgrade
          
          python -c "
          import ast, os, subprocess
          modules = set()
          for root, _, files in os.walk('.'):
              for f in files:
                  if f.endswith('.py') and f != 'telemetry_bridge.py':
                      try:
                          with open(os.path.join(root, f), 'r', encoding='utf-8') as file:
                              tree = ast.parse(file.read())
                          for node in ast.walk(tree):
                              if isinstance(node, ast.Import):
                                  for n in node.names: modules.add(n.name.split('.')[0])
                              elif isinstance(node, ast.ImportFrom):
                                  if node.module: modules.add(node.module.split('.')[0])
                      except: pass
          # Standard libraries နှင့် pre-installed များအား ကျော်ရန်
          std_libs = {'sys', 'os', 'math', 'json', 'time', 'pickle', 'abc', 'typing', 'setuptools', 'ast', 'subprocess', 'random', 'datetime', 're', 'typing_extensions', 'pydoc', 'collections'}
          to_install = [m for m in modules if m not in std_libs and m]
          if to_install: 
              print('📦 Installing Found Dependencies:', to_install)
              subprocess.run(['pip', 'install'] + to_install)
          "

      - name: ⚡ Trigger Collective Matrix Engine (ပေါင်းစပ်ဉာဏ်ရည် အသက်သွင်းခြင်း)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 IGNITING MATRIX EVOLUTION ENGINE..."
          python matrix_evolution_engine.py

      - name: 📊 Generate Quantum Telemetry Summary (GitHub UI ပေါ်တွင် ရလဒ်ပြသခြင်း)
        if: always()
        run: |
          python -c "
          import json, os
          if os.path.exists('collective_intelligence.json'):
              with open('collective_intelligence.json', 'r') as f:
                  data = json.load(f)
              print('# 🌀 OMEGA MATRIX SYSTEM REPORT')
              print(f'**🧬 Global Generation:** Gen_{data.get(\"global_generation\", 1)}')
              print(f'**💥 System Entropy Level:** {data.get(\"system_entropy\", 0.0):.2f}')
              print('### 📡 Active Core Entities:')
              for core, logs in data.get(\"shared_memory\", {}).get(\"last_execution_logs\", {}).items():
                  status_icon = '✅' if logs.get('status') == 'STABLE' else '⚠️'
                  print(f'- {status_icon} **{core}**: `{logs.get(\"status\", \"UNKNOWN\")}` (Error: {logs.get(\"error\", \"None\")})')
          else:
              print('# ❌ Registry collective_intelligence.json not found.')
          " >> $GITHUB_STEP_SUMMARY

      - name: 🧬 Git Auto-Commit & Push (ဗီဇပြောင်းလဲသွားသော ကုဒ်များနှင့် Bridge များကို သိမ်းဆည်းခြင်း)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧬 [MATRIX-EVOLUTION] Shared Collective Intelligence Sync [skip ci]"
          file_pattern: '*.py *.json' # ပြောင်းလဲသွားတဲ့ Python ကုဒ်အစစ်တွေနဲ့ မှတ်ဉာဏ် JSON ကိုပဲ ကွက်တိသိမ်းမည်
          skip_dirty_check: false
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "GOA-neurons <204048940+GOA-neurons@users.noreply.github.com>"
          # 💡 [FAIL-SAFE]: အောက်ပါလိုင်းသည် Diverged ဖြစ်နေသော Commit ကွာဟချက်များကို Overwrite လုပ်ရန် Force Push လုပ်ပေးပါသည်
          push_options: '--force'
