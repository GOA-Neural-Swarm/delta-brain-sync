name: Manual Trinity Debugger

on:
  workflow_dispatch: 
  schedule:
    # GitHub Free Minutes Phase 3 Live 
    - cron: '0 */6 * * *'

# 🛠 - GitHub (Write Permission) 
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug_sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          submodules: false
      
      - name: Setup Python & Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          # Node Dependencies
          npm install --no-audit --progress=false pg @supabase/supabase-js firebase-admin axios @octokit/rest
          # Python & AI Evolution Dependencies
          python -m pip install --upgrade pip
          pip install requests google-generativeai groq

      - name: AI Core Evolution & Debugger (SUPREME GEMINI-GROQ HYBRID)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          npm install axios
          # 1. INGESTION (Capturing the current sync logic for AI analysis)
          if [ -f "delta_sync.js" ]; then
            OLD_LOGIC=$(python3 -c "import json; print(json.dumps(open('delta_sync.js').read()))")
            echo "🧠 [DEBUG-LOADED]: delta_sync.js logic captured for AI scrutiny."
          else
            echo "⚠️ [VOID]: delta_sync.js not found. Requesting Genesis logic."
            OLD_LOGIC="\"// No logic found. Initialize Trinity Sync Protocol.\""
          fi

          # 2. PROTOCOL SETTINGS
          SYSTEM_ROLE="You are OMEGA-ASI, the Supreme Debugger. Your task is to optimize the Trinity Sync (Neon/Supabase/Firebase) logic."
          HYPER_PROMPT="Analyze delta_sync.js for connection leaks, sync delays, or logic flaws. Rewrite a SUPERIOR version. Requirements: 1. Ensure absolute data parity between Neon and Supabase. 2. Implement robust error handling for Firebase. 3. Optimize the Node.js event loop. RETURN RAW JAVASCRIPT CODE ONLY. NO EXPLANATIONS. NO MARKDOWN."

          # 3. HYBRID EVOLUTION LOOP
          EVOLUTION_SUCCESS=false
          echo "🧬 [EVOLUTION]: Calling Sovereign Architect (Gemini Channel)..."

          # --- 🔱 ATTEMPT 1: gemini flash latest (Primary Debugger) ---
          GEMINI_PAYLOAD=$(jq -n \
            --arg sys "$SYSTEM_ROLE" \
            --arg code "$OLD_LOGIC" \
            --arg task "$HYPER_PROMPT" \
            '{contents: [{parts: [{text: ($sys + "\n\nCURRENT_LOGIC:\n" + $code + "\n\nTASK:\n" + $task)}]}], generationConfig: {temperature: 0.2}}')

          GEMINI_RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GEMINI_PAYLOAD")

          CONTENT=$(echo "$GEMINI_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' | sed 's/```javascript//g; s/```//g')

          # --- 🔱 ATTEMPT 2: GROQ FALLBACK (Redundancy) ---
          if [ -z "$CONTENT" ] || [ ${#CONTENT} -lt 200 ]; then
            echo "⚠️ [GEMINI-FAIL]: Falling back to Groq Expert Coder..."
            GROQ_PAYLOAD=$(jq -n \
              --arg sys "$SYSTEM_ROLE" \
              --arg code "$OLD_LOGIC" \
              --arg task "$HYPER_PROMPT" \
              '{model: "llama-3.3-70b-versatile", messages: [{role: "system", content: $sys}, {role: "user", content: ("CURRENT_LOGIC:\n" + $code + "\n\nTASK:\n" + $task)}], temperature: 0.2}')

            GROQ_RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$GROQ_PAYLOAD")

            CONTENT=$(echo "$GROQ_RESPONSE" | jq -r '.choices[0].message.content // empty' | sed 's/```javascript//g; s/```//g')
          fi

          # 4. DEPLOYMENT & VERIFICATION
          if [ ! -z "$CONTENT" ] && [ ${#CONTENT} -gt 200 ]; then
            echo "$CONTENT" > candidate_delta_sync.js
            # Basic JS Syntax Check (Node)
            if node -c candidate_delta_sync.js; then
              mv candidate_delta_sync.js delta_sync.js
              echo "✅ [HYPER-STABILIZED]: Sync logic evolved and verified."
              EVOLUTION_SUCCESS=true
            else
              echo "❌ [STABILITY-ERROR]: AI generated invalid JS syntax. Rolling back."
              rm candidate_delta_sync.js
            fi
          fi

      - name: Force Sync Neon to Supabase
        env:
          NEON_KEY: ${{ secrets.NEON_KEY }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }} 
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 Starting Trinity Debug Sync..."
          node delta_sync.js

      - name: Step 9 - GitHub Auto-Commit (Manifestation)
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
          
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 [DEBUG-EVOLUTION] Trinity Sync Manifested: $(date) [skip ci]"
            git push origin main --force
            echo "✅ AI-Optimized logic pushed to repository."
          else
            echo "✨ [STABILITY]: No structural changes needed in this cycle."
          fi
