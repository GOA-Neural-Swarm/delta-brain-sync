name: Manual Trinity Debugger

on:
  workflow_dispatch: 
  schedule:
    
    # GitHub Free Minutes Phase 3 Live 
    - cron: '0 */6 * * *'

# 🛠 - GitHub (Write Permission) 
permissions:
  contents: write
  pages: write
  id-token: write


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug_sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        
        run: npm install --no-audit --progress=false pg @supabase/supabase-js firebase-admin

      - name: Force Sync Neon to Supabase
        env:
          # Database & Firebase Keys
          NEON_KEY: ${{ secrets.NEON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          
          # GitHub Authentication (PAT or GITHUB_TOKEN)
          
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
        run: node delta_sync.js
