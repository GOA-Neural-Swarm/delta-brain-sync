name: OMEGA ABSOLUTE AUDITOR (Brain-Sync Guard)

on:
  push:
    branches: [ evolution-lab ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-and-diagnose:
    name: 🧠 Brain Diagnosis • Python Safety Phase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Brain Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ================= 🛠️ 1. PYTHON SETUP =================
      - name: Environment Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ================= 🔬 REMOTE DIAGNOSIS =================
      - name: Run Remote Diagnosis
        run: |
          echo "🔍 Starting Deep Scan for Package Conflicts..."
          if [ -f debug_env.py ]; then python debug_env.py; fi
          echo "------------------------------------------"
      
      - name: Install Critical Dependencies
        run: |
          python -m pip install --upgrade pip
          # Essential AI libraries (CPU optimized for Runner)
          pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir transformers diffusers accelerate safetensors
          
      - name: Install UI & Connectors
        run: |
          # UI dependencies with fixed versions for stability
          pip install --no-cache-dir huggingface_hub==0.24.0 gradio==4.44.1 websockets==12.0
          
      - name: Install Diagnostic Tools & Remaining Packages
        run: |
          # Install tools first to ensure they are available
          pip install flake8 black mypy bandit requests google-genai groq
          
          if [ -f requirements.txt ]; then 
            # Filter out already installed heavy packages to avoid resolution conflicts
            grep -vE "torch|transformers|gradio|websockets|google-genai|groq" requirements.txt > req_cleaned.txt
            pip install --no-cache-dir -r req_cleaned.txt || echo "Minor dependency conflict ignored"
          fi
      
      # ================= 🩺 2. STRUCTURAL DIAGNOSIS =================
      - name: Diagnosis (Linting & Syntax Check)
        run: |
          echo "Cleaning all non-printable characters (U+00A0)..."
          find . -name "*.py" -exec sed -i 's/\xc2\xa0/ /g' {} +
          
          echo "Running Flake8 structural analysis..."
          # python -m flake8 ကို သုံးခှငြးဖှင့ြ 'command not found' ကို တားဆီးသညြ
          python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Linting issues found but continuing..."
          
          echo "Verifying Python syntax..."
          if [ -d "./kaggle_brain" ] && [ -f "./kaggle_brain/main.py" ]; then
            python -m compileall ./kaggle_brain/main.py || (echo "ERROR: Brain logic syntax failed!" && exit 1)
          elif [ -f "main.py" ]; then
            python -m compileall main.py || (echo "ERROR: Root main.py syntax failed!" && exit 1)
          fi

      # ================= 🧬 3. AI RECURSIVE AUDIT (UPGRADED TO GEMINI 2.0) =================
      - name: AI Recursive Evolution Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # 1. IDENTIFY AUDIT TARGET
          TARGET="main.py"
          if [ -d "./kaggle_brain" ] && [ -f "./kaggle_brain/main.py" ]; then TARGET="./kaggle_brain/main.py"; fi
          if [ ! -f "$TARGET" ] && [ -f "app.py" ]; then TARGET="app.py"; fi
          
          echo "🎯 Target for Audit: $TARGET"
          OLD_CODE=$(python3 -c "import json; print(json.dumps(open('$TARGET').read()))")
          SYSTEM_ROLE="You are OMEGA-ASI, the Supreme Auditor. Your task is to audit code for bugs and rewrite it for maximum performance."
          HYPER_PROMPT="Analyze this $TARGET for logical flaws. Rewrite it to be more efficient. RETURN ONLY THE RAW PYTHON CODE. NO MARKDOWN BLOCKS."

          echo "🧬 [AUDIT]: Initiating Supreme AI Correction Cycle..."

          # --- 🔱 ATTEMPT 1: GEMINI 2.0 FLASH (Primary) ---
          GEMINI_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" '{contents: [{parts: [{text: ($sys + "\n\nCODE:\n" + $code + "\n\nTASK:\n" + $task)}]}], generationConfig: {temperature: 0.2, maxOutputTokens: 8192}}')
          # v1beta endpoint for Gemini 2.0 Flash
          GEMINI_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" -H "Content-Type: application/json" -d "$GEMINI_PAYLOAD")
          
          # Clean extraction: Remove potential markdown artifacts
          CONTENT=$(echo "$GEMINI_RES" | jq -r '.candidates[0].content.parts[0].text // empty' | sed 's/```python//g; s/```//g')

          # --- 🔱 ATTEMPT 2: GROQ FALLBACK ---
          if [ -z "$CONTENT" ] || [ ${#CONTENT} -lt 100 ]; then
            echo "⚠️ [GEMINI-FAIL]: Falling back to Groq Expert Auditor..."
            GROQ_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" '{model: "llama-3.3-70b-versatile", messages: [{role: "system", content: $sys}, {role: "user", content: ("CODE:\n" + $code + "\n\nTASK:\n" + $task)}], temperature: 0.1, max_tokens: 4096}')
            GROQ_RES=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" -H "Authorization: Bearer $GROQ_API_KEY" -H "Content-Type: application/json" -d "$GROQ_PAYLOAD")
            CONTENT=$(echo "$GROQ_RES" | jq -r '.choices[0].message.content // empty' | sed 's/```python//g; s/```//g')
          fi

          # Only overwrite if content is valid (preventing accidental deletion)
          if [ ! -z "$CONTENT" ] && [ ${#CONTENT} -gt 100 ]; then
            printf "%s\n" "$CONTENT" > "$TARGET"
            echo "✅ [AUDIT-COMPLETE]: Brain logic refined by AI Hybrid (Gemini 2.0)."
          else
            echo "❌ [AUDIT-FAILED]: AI returned empty or invalid content. Keeping original code."
          fi

      # ================= 🛡️ 4. SECURITY GUARD =================
      - name: Safety Guard (Security Audit)
        run: |
          echo "Scanning for security vulnerabilities..."
          # Use python -m to avoid path issues
          python -m bandit -r . --exit-zero
          
          if grep -qE "AI_KEY|TOKEN|SECRET|PASSWORD" main.py 2>/dev/null; then
            echo "⚠️ WARNING: Potential hardcoded secret detected!"
          fi

      # ================= 🔬 5. QUALITY INSPECTION =================
      - name: Quality Superiority Inspection
        run: |
          TARGET="main.py"
          if [ -f "./kaggle_brain/main.py" ]; then TARGET="./kaggle_brain/main.py"; fi
          
          NEW_SIZE=$(wc -c < "$TARGET")
          echo "Final File Size: $NEW_SIZE bytes"
          
          if [ $NEW_SIZE -lt 100 ]; then 
            echo "ERROR: Integrity check failed - File too small!"; exit 1; 
          fi

      # ================= 🔧 6. AUTO-REPAIR =================
      - name: Aesthetic Polish
        run: |
          python -m black .
          echo "Logic formatted to PEP8 standards."

  final-sovereign-merge:
    name: 🧬 Secure Sovereign Installation (Merge)
    needs: audit-and-diagnose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Final Integrity Sync
        run: |
          git config --global user.name "OMEGA-AUDITOR"
          git config --global user.email "auditor@goa-natural-order.ai"
          
          git fetch origin evolution-lab
          git checkout main
          git pull origin main
          
          # Copy audited files from lab branch to main
          # (ဒီနရောလေးမှာပဲ error မတကအြောငြ origin/ ဆိုပှီး remote ကို တိုကရြိုကညြှှနြးလိုကပြါတယြ)
          git checkout origin/evolution-lab -- .
          
          # Prevent workflow self-modification if not authorized
          # (မငြးရဲ့ မူလ logic အတိုငြး workflow ဖိုငတြှကေို main အတိုငြး ပှနထြားမယ့ြ အပိုငြးပါ)
          git reset HEAD .github/workflows/
          git checkout -- .github/workflows/
          
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "🚀 [BRAIN-EVOLUTION]: Lab Certified (Gemini 2.0 Integration)."
            git push origin main --force
          else
            echo "No changes to sync."
          fi
