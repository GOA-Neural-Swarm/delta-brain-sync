name: OMEGA ABSOLUTE AUDITOR (Brain-Sync Guard)

on:
  push:
    branches: [ evolution-lab ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-and-diagnose:
    name: 🧠 Brain Diagnosis • Python Safety Phase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Brain Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ================= 🛠️ 1. PYTHON SETUP =================
      - name: Environment Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ================= 🔬 REMOTE DIAGNOSIS =================
      - name: Run Remote Diagnosis
        run: |
          echo "🔍 Starting Deep Scan for Package Conflicts..."
          python debug_env.py
          echo "------------------------------------------"
      
      - name: Install Dependencies & Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy bandit
          if [ -f requirements.txt ]; then 
            pip install --no-cache-dir -r requirements.txt --upgrade
          fi
          pip install --upgrade google-genai groq requests
      
      # ================= 🩺 2. STRUCTURAL DIAGNOSIS =================
      - name: Diagnosis (Linting & Syntax Check)
        run: |
          echo "Cleaning all non-printable characters (U+00A0) in all subdirectories..."
          # Repository တစ်ခုလုံးက .py ဖိုင်အားလုံးကို လိုက်ရှင်းမယ်
          find . -name "*.py" -exec sed -i 's/\xc2\xa0/ /g' {} +
          
          echo "Running Flake8 structural analysis..."
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          echo "Verifying Python syntax..."
          # Path အမှန်ဖြစ်တဲ့ ./kaggle_brain/main.py ကို စစ်မယ်
          if [ -d "./kaggle_brain" ] && [ -f "./kaggle_brain/main.py" ]; then
            python -m compileall ./kaggle_brain/main.py || (echo "ERROR: Brain logic syntax failed!" && exit 1)
          else
            python -m compileall main.py || (echo "ERROR: Root main.py syntax failed!" && exit 1)
          fi

      # ================= 🧬 3. AI RECURSIVE AUDIT (NEW: GEMINI-GROQ HYBRID) =================
      - name: AI Recursive Evolution Audit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # 1. IDENTIFY AUDIT TARGET
          TARGET="main.py"
          if [ -f "./kaggle_brain/main.py" ]; then TARGET="./kaggle_brain/main.py"; fi
          
          OLD_CODE=$(python3 -c "import json; print(json.dumps(open('$TARGET').read()))")
          SYSTEM_ROLE="You are OMEGA-ASI, the Supreme Auditor. Your task is to audit code for bugs and rewrite it for maximum performance."
          HYPER_PROMPT="Analyze this $TARGET for logical flaws. Rewrite it to be more efficient. RETURN RAW PYTHON CODE ONLY. NO MARKDOWN."

          echo "🧬 [AUDIT]: Initiating Supreme AI Correction Cycle..."

          # --- 🔱 ATTEMPT 1: GEMINI FLASH LATEST ---
          GEMINI_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" '{contents: [{parts: [{text: ($sys + "\n\nCODE:\n" + $code + "\n\nTASK:\n" + $task)}]}], generationConfig: {temperature: 0.1}}')
          GEMINI_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=$GEMINI_API_KEY" -H "Content-Type: application/json" -d "$GEMINI_PAYLOAD")
          CONTENT=$(echo "$GEMINI_RES" | jq -r '.candidates[0].content.parts[0].text // empty' | sed 's/```python//g; s/```//g')

          # --- 🔱 ATTEMPT 2: GROQ FALLBACK ---
          if [ -z "$CONTENT" ] || [ ${#CONTENT} -lt 500 ]; then
            echo "⚠️ [GEMINI-SILENCE]: Falling back to Groq Expert Auditor..."
            GROQ_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" '{model: "llama-3.3-70b-versatile", messages: [{role: "system", content: $sys}, {role: "user", content: ("CODE:\n" + $code + "\n\nTASK:\n" + $task)}], temperature: 0.1}')
            GROQ_RES=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" -H "Authorization: Bearer $GROQ_API_KEY" -H "Content-Type: application/json" -d "$GROQ_PAYLOAD")
            CONTENT=$(echo "$GROQ_RES" | jq -r '.choices[0].message.content // empty' | sed 's/```python//g; s/```//g')
          fi

          if [ ! -z "$CONTENT" ] && [ ${#CONTENT} -gt 500 ]; then
            echo "$CONTENT" > "$TARGET"
            echo "✅ [AUDIT-COMPLETE]: Brain logic refined by AI Hybrid."
          fi

      # ================= 🛡️ 4. SECURITY GUARD =================
      - name: Safety Guard (Security Audit)
        run: |
          echo "Scanning for security vulnerabilities with Bandit..."
          bandit -r . --exit-zero
          
          echo "Scanning for secret leaks..."
          if grep -qE "AI_KEY|TOKEN|SECRET|PASSWORD" main.py; then
            echo "WARNING: Potential hardcoded secret detected in Brain Logic!"
          fi

      # ================= 🔬 5. QUALITY INSPECTION =================
      - name: Quality Superiority Inspection
        run: |
          git fetch origin main
          OLD_SIZE=$(git show origin/main:main.py 2>/dev/null | wc -c || echo 0)
          NEW_SIZE=$(wc -c < main.py)
          
          echo "Old Size: $OLD_SIZE | New Size: $NEW_SIZE"
          
          if [ $NEW_SIZE -lt 500 ]; then 
            echo "ERROR: Brain integrity check failed - Logic too thin!"; exit 1; 
          fi

      # ================= 🔧 6. AUTO-REPAIR =================
      - name: Aesthetic Polish
        run: |
          black .
          echo "Logic formatted to PEP8 standards."

  final-sovereign-merge:
    name: 🧬 Secure Sovereign Installation (Merge)
    needs: audit-and-diagnose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      # ================= 🧬 UNIVERSAL SOVEREIGN INSTALLATION =================
      - name: Final Integrity Sync
        run: |
          # 1. Identity Setup
          git config --global user.name "OMEGA-AUDITOR"
          git config --global user.email "auditor@goa-natural-order.ai"
          
          # 2. Force Sync Strategy (Avoiding Ref errors)
          git fetch origin evolution-lab:evolution-lab
          
          # 3. Switch to Main and Overwrite
          git checkout main
          git pull origin main
          
          # 4. Heavy Injection (Copying files from evolution branch to main)
          git checkout evolution-lab -- .
          
          # 5. Safety Reset for Workflow (Preventing Permission Issues)
          git reset HEAD .github/workflows/
          git checkout -- .github/workflows/
          
          # 6. Commit and Authority Push
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "🚀 [BRAIN-EVOLUTION]: Lab Certified & Installed (Universal Sync)."
            git push origin main --force
            echo "🏁 Brain Upgrade Complete."
          else
            echo "No changes to sync"
          fi
