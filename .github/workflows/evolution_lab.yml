name: OMEGA ABSOLUTE AUDITOR (Brain-Sync Guard)

on:
  push:
    branches: [ evolution-lab ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-and-diagnose:
    name: 🧠 Brain Diagnosis • Python Safety Phase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Brain Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ================= 🛠️ 1. PYTHON SETUP =================
      - name: Environment Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Diagnostic Tools
        run: |
          pip install flake8 black mypy bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ================= 🩺 2. STRUCTURAL DIAGNOSIS =================
      - name: Diagnosis (Linting & Syntax Check)
        run: |
          echo "Cleaning all non-printable characters (U+00A0) in all subdirectories..."
          # Repository တစ်ခုလုံးက .py ဖိုင်အားလုံးကို လိုက်ရှင်းမယ်
          find . -name "*.py" -exec sed -i 's/\xc2\xa0/ /g' {} +
          
          echo "Running Flake8 structural analysis..."
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          echo "Verifying Python syntax..."
          # Path အမှန်ဖြစ်တဲ့ ./kaggle_brain/main.py ကို စစ်မယ်
          python -m compileall ./kaggle_brain/main.py || (echo "ERROR: Brain logic syntax failed!" && exit 1)
      
        
          
          

      # ================= 🛡️ 3. SECURITY GUARD =================
      - name: Safety Guard (Security Audit)
        run: |
          echo "Scanning for security vulnerabilities with Bandit..."
          bandit -r main.py
          
          echo "Scanning for secret leaks..."
          if grep -qE "AI_KEY|TOKEN|SECRET|PASSWORD" main.py; then
            echo "WARNING: Potential hardcoded secret detected in Brain Logic!"
          fi

      # ================= 🔬 4. QUALITY INSPECTION =================
      - name: Quality Superiority Inspection
        run: |
          git fetch origin main
          OLD_SIZE=$(git show origin/main:main.py 2>/dev/null | wc -c || echo 0)
          NEW_SIZE=$(wc -c < main.py)
          
          echo "Old Size: $OLD_SIZE | New Size: $NEW_SIZE"
          
          if [ $NEW_SIZE -lt 500 ]; then 
            echo "ERROR: Brain integrity check failed - Logic too thin!"; exit 1; 
          fi

      # ================= 🔧 5. AUTO-REPAIR =================
      - name: Aesthetic Polish
        run: |
          black main.py
          echo "Logic formatted to PEP8 standards."

  final-sovereign-merge:
    name: 🧬 Secure Sovereign Installation (Merge)
    needs: audit-and-diagnose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Final Integrity Merge
        run: |
          git config --global user.name "OMEGA-AUDITOR"
          git config --global user.email "auditor@goa-natural-order.ai"
          git fetch origin evolution-lab
          git merge --no-ff origin/evolution-lab -m "🚀 [BRAIN-EVOLUTION]: Lab Certified & Installed." || (echo "❌ Merge Conflict!"; exit 1)
          git push origin main
          echo "🏁 Brain Upgrade Complete."
