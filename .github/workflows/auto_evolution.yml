name: 🧬 SOVEREIGN HYPER-EVOLUTION ENGINE

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '*.bak'
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  evolution_cycle:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛰️ Step 1 - Ingesting Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: 🐍 Step 2 - Stabilizing Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Step 3 - Injecting Necessary Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai groq pandas sqlalchemy 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧠 Step 4 - Executing Autonomous Self-Healing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          rm -f *.bak
          python evolution_engine.py

      - name: 🏁 Step 5 - Manifesting Evolution (Auto-Commit)
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          
          # 1. Temporary files cleanup
          rm -f *.bak
          
          # 2. Update .gitignore to include all requested patterns
          cat <<EOF > .gitignore
          node_modules/
          repo_sync/
          .env
          *.log
          *.bak
          __pycache__/
          *.pyc
          *.pyo
          *.pyd
          kaggle_deploy/
          EOF
          
          # 3. Process changes and index cleanup
          git add .
          git rm -r --cached __pycache__/ || true
          git rm --cached *.pyc *.pyo *.pyd *.bak || true
          
          # 4. Final Verification and Deployment
          if ! git diff --cached --quiet; then
            git commit -m "🧬 [HYPER-EVOLUTION]: Self-correction applied (Deprecation & Stability Fix) - $(date)"
            git push origin main --force
            echo "✅ [SUCCESS]: New genetic material manifested in main branch."
          else
            echo "🛡️ [STABLE]: No evolution needed. System is at peak performance."
          fi
