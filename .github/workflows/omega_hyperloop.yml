name: SOVEREIGN_HYPER_AUTONOMOUS_INTEGRATED_LOOP 

on:
  push:
    branches: [main]
    paths:
      - 'kaggle_brain/**'
      - 'app.py'
      - 'main.py'
      - 'brain.py'
      - 'sync_data.py'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sovereign_evolution_cycle:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Step 1 - Full Repository Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          submodules: false
      
      - name: Step 2 - Multi-Language Environment Setup (Python 3.10 & Node 24)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Step 3 - Sovereign Git Identity & Remote Configuration
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git config --global pull.rebase false
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Step 4 - Install Comprehensive Evolution Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install websockets==12.0 datasets pandas sqlalchemy psycopg2-binary requests groq sentence-transformers "gradio<6.0.0" python-dotenv huggingface_hub diffusers transformers accelerate bitsandbytes numpy scikit-learn firebase-admin gitpython safetensors Pillow kaggle google-generativeai
          npm install pg @supabase/supabase-js firebase-admin axios js-yaml --quiet
          echo "PATH=$PATH:/home/runner/.local/bin" >> $GITHUB_ENV

      - name: Step 5 - Cross-Platform Data Synchronization (Trinity Sync)
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          NEON_KEY: ${{ secrets.NEON_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -f "sync_data.py" ]; then
            python sync_data.py
          elif [ -f "brain.py" ]; then
            python -c "try: from brain import sync_data; sync_data(); print('Sync via brain.py success') except Exception as e: print(f'Sync Error: {e}')"
          else
            echo "⚠️ No synchronization scripts found. Proceeding with caution."
          fi

      - name: Step 6 - Kaggle Kernel Deployment & Metadata Prep
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          mkdir -p kaggle_deploy
          
          if [ -f "kaggle_brain/main.py" ]; then
            cp kaggle_brain/main.py kaggle_deploy/main.py
          elif [ -f "main.py" ]; then
            cp main.py kaggle_deploy/main.py
          else
            echo "❌ Logic Target Missing" && exit 1
          fi

          cat <<EOF > kaggle_deploy/kernel-metadata.json
          {
            "id": "telefox/delta-brain-sync",
            "title": "delta-brain-sync",
            "code_file": "main.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": [],
            "model_sources": []
          }
          EOF
          kaggle kernels push -p kaggle_deploy || echo "Kaggle busy."

      - name: Step 7 - Recursive Evolution Engine (3-Cycle Gemini-Groq Hybrid)
        timeout-minutes: 20
        env:
          DATABASE_URL: ${{ secrets.NEON_DB_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 1. Target Identification
          if [ -f "app.py" ]; then TARGET="app.py"; elif [ -f "main.py" ]; then TARGET="main.py"; else echo "No target found" && exit 1; fi
          
          # 2. Ingest Current Code State
          OLD_CODE=$(python3 -c "import json; print(json.dumps(open('$TARGET').read()))")
          
          # 3. Evolutionary Prompting
          SYSTEM_ROLE="You are OMEGA-ASI, the Sovereign Architect. Your mission is Recursive Self-Evolution. Focus on High-Performance Modular Neural Architectures with manual backprop logic."
          HYPER_PROMPT="Analyze current code. Rewrite a SUPERIOR version of $TARGET. Must use numpy for 784-feature synthetic data. Optimize GQA, MoE, and training loops. INTEGRATE advanced Gemini/Groq redundant logic. RETURN RAW PYTHON CODE ONLY. NO MARKDOWN."

          EVOLUTION_SUCCESS=false
          for i in {1..3}; do
            echo "🧬 [CYCLE $i/3]: Initiating Hybrid Evolution..."
            
            # --- Attempt A: Gemini 2.0 Flash ---
            GEMINI_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" \
              '{contents: [{parts: [{text: ($sys + "\n\nCODE:\n" + $code + "\n\nTASK:\n" + $task)}]}], generationConfig: {temperature: 0.4, maxOutputTokens: 8192}}')
            
            GEMINI_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" -d "$GEMINI_PAYLOAD")
            
            CONTENT=$(echo "$GEMINI_RES" | jq -r '.candidates[0].content.parts[0].text // empty' | sed 's/```python//g; s/```//g')

            # --- Attempt B: Groq Llama-3.3-70b Fallback ---
            if [ -z "$CONTENT" ] || [ ${#CONTENT} -lt 500 ]; then
              echo "⚠️ Gemini Signal Weak. Engaging Groq Expert Logic..."
              GROQ_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" \
                '{model: "llama-3.3-70b-versatile", messages: [{role: "system", content: $sys}, {role: "user", content: ("CODE:\n" + $code + "\n\nTASK:\n" + $task)}], temperature: 0.4}')
              
              GROQ_RES=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
                -H "Authorization: Bearer $GRO_API_KEY" -H "Content-Type: application/json" -d "$GROQ_PAYLOAD")
              
              CONTENT=$(echo "$GROQ_RES" | jq -r '.choices[0].message.content // empty' | sed 's/```python//g; s/```//g')
            fi

            # --- Stability Verification ---
            if [ ! -z "$CONTENT" ] && [ ${#CONTENT} -gt 500 ]; then
              printf "%s\n" "$CONTENT" > candidate.py
              if python3 -m py_compile candidate.py; then
                mv candidate.py "$TARGET"
                echo "✅ [SUCCESS]: $TARGET evolution stabilized."
                EVOLUTION_SUCCESS=true
                break
              else
                echo "❌ [SYNTAX ERROR]: Cycle $i failed check."
                rm candidate.py
              fi
            fi
          done

          # 4. Survival Protocol
          if [ "$EVOLUTION_SUCCESS" != "true" ]; then
            echo "🚨 Critical Failure. Engaging Survival Mode."
            if [ ! -s "$TARGET" ] && [ -f "survival_brain.py" ]; then
              cp survival_brain.py "$TARGET"
            fi
          fi

      - name: Step 8 - Delta Sync (NodeJS Engine)
        env:
          NEON_KEY: ${{ secrets.NEON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -f "delta_sync.js" ]; then
            node delta_sync.js
          fi

      - name: Step 9 - Repository Architecture Optimization
        run: |
          git rm -r --cached node_modules || true
          git rm -rf --cached repo_sync || true
          cat <<EOF > .gitignore
          node_modules/
          repo_sync/
          __pycache__/
          *.pyc
          .env
          *.log
          kaggle_deploy/
          EOF
          echo "✅ Repo structure optimized."

      - name: Step 10 - Manifestation (Force Push Evolution)
        run: |
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 [HYPER_AUTONOMOUS_EVOLUTION] Full Trinity Sync Cycle Completed [skip ci]"
            git fetch origin main
            git reset --soft origin/main
            git push origin main --force
            echo "✅ Manifestation complete."
          else
            echo "No changes in current cycle."
          fi
