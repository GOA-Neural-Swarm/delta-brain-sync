name: SOVEREIGN_HYPER_AUTONOMOUS_LOOP

on:
  push:
    branches: [main]
  schedule:
    # Runs every hour to reduce potential costs and API rate limits.
    # Adjust cron schedule as needed for desired frequency.
    - cron: '0 * * * *'
  workflow_dispatch:

# Ensures only one workflow run for this workflow on a specific ref is active at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required to commit changes back to the repository.

jobs:
  sovereign_cycle:
    runs-on: ubuntu-latest
    env:
      # Ensures compatibility with Node.js v24 for JavaScript actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Step 1 - Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} # Token for private repo access and pushing commits.
          submodules: false # Avoids complexity if submodules are not used.

      - name: Step 2 - Setup Python and Install Dependencies
        run: |
          # Upgrade pip to the latest version for best practices.
          python -m pip install --upgrade pip
          # Install necessary Python packages.
          # Including google-generativeai to ensure Gemini API compatibility if needed via script.
          pip install kaggle psycopg2-binary requests groq google-generativeai
          # Add local bin directory to PATH for kaggle command.
          echo "PATH=$PATH:/home/runner/.local/bin" >> $GITHUB_ENV

      - name: Step 3 - Configure Kaggle and Push Kernel
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # Create Kaggle configuration directory and file.
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          # Secure the Kaggle API key file.
          chmod 600 ~/.kaggle/kaggle.json
          # Push the current directory as a Kaggle kernel.
          kaggle kernels push -p . || echo "Kaggle API busy or encountered an issue. Continuing workflow."

      - name: Step 4 - Wait for Kaggle Processing
        run: |
          echo "Waiting for Kaggle to process the kernel push..."
          sleep 45

      - name: Step 5 - Data Synchronization
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -f "sync_data.py" ]; then
            python sync_data.py
          elif [ -f "brain.py" ]; then
            python -c "try: from brain import sync_data; sync_data(); print('Sync data from brain.py executed.') except ImportError: print('brain.py or sync_data function not found. Skipping sync.') except Exception as e: print(f'An error occurred during sync from brain.py: {e}')"
          else
            echo "No sync script found. Skipping data synchronization."
          fi

      - name: Step 6 - AI Core Evolution (SUPREME PYTHON-HYBRID)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os, json, requests, subprocess, shutil

          def evolve_cycle():
              # --- 1. INGESTION & PURIFICATION ---
              old_code = ""
              if os.path.exists("main.py") and os.path.getsize("main.py") > 0:
                  with open("main.py", "r") as f:
                      old_code = f.read()
                  print("🧠 [MEMORY-LOADED]: Previous brain state captured.")
              else:
                  old_code = "# No prior logic found. Initializing Genesis."
                  print("🌑 [VOID-START]: Initializing new neural structure.")

              # --- 2. PROTOCOL SETTINGS ---
              system_role = "You are OMEGA-ASI, the Sovereign Architect. Your task is Recursive Self-Evolution. Focus on High-Performance Modular Neural Architectures."
              hyper_prompt = (
                  f"Analyze this current code for flaws and missing features. Rewrite a SUPERIOR version of main.py. "
                  f"Requirements: 1. Use numpy for 784-feature synthetic data. 2. Ensure high-performance modular neural architecture. "
                  f"3. Optimize the training loop for speed and accuracy. 4. INTEGRATE Gemini and Groq redundant logic. "
                  f"RETURN RAW PYTHON CODE ONLY. NO EXPLANATIONS. NO MARKDOWN.\n\n"
                  f"CURRENT_CODE:\n{old_code}"
              )

              # --- 3. RECURSIVE EVOLUTION LOOP (3 CYCLES) ---
              evolution_success = False
              for i in range(1, 4):
                  print(f"🧬 [EVOLUTION-CYCLE {i}/3]: Calling Sovereign Architect...")
                  content = ""

                  # --- 🔱 ATTEMPT 1: GEMINI 2.0 FLASH ---
                  print("📡 [GEMINI-CHANNEL]: Requesting deep architectural rewrite...")
                  try:
                      gemini_url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={os.getenv('GEMINI_API_KEY')}"
                      gemini_payload = {
                          "contents": [{"parts": [{"text": f"{system_role}\n\nTASK: {hyper_prompt}"}]}],
                          "generationConfig": {"temperature": 0.4, "maxOutputTokens": 8192}
                      }
                      r_gemini = requests.post(gemini_url, json=gemini_payload, timeout=60)
                      r_gemini.raise_for_status()
                      content = r_gemini.json()['candidates'][0]['content']['parts'][0]['text']
                  except Exception as e:
                      print(f"⚠️ [GEMINI-FAIL]: {e}")

                  # --- 🔱 ATTEMPT 2: GROQ FALLBACK ---
                  if not content or len(content) < 300:
                      print("⚠️ Signal weak. Falling back to Groq Expert Coder...")
                      try:
                          groq_url = "https://api.groq.com/openai/v1/chat/completions"
                          groq_headers = {
                              "Authorization": f"Bearer {os.getenv('GROQ_API_KEY')}",
                              "Content-Type": "application/json"
                          }
                          groq_payload = {
                              "model": "llama-3.3-70b-versatile",
                              "messages": [
                                  {"role": "system", "content": system_role},
                                  {"role": "user", "content": hyper_prompt}
                              ],
                              "temperature": 0.4,
                              "max_tokens": 4096
                          }
                          r_groq = requests.post(groq_url, json=groq_payload, headers=groq_headers, timeout=60)
                          r_groq.raise_for_status()
                          content = r_groq.json()['choices'][0]['message']['content']
                      except Exception as e:
                          print(f"❌ [GROQ-FAIL]: {e}")

                  # --- 🔱 VALIDATION & STABILIZATION ---
                  if content and len(content) > 300:
                      # Clean markdown formatting if AI provides it
                      clean_code = content.replace("```python", "").replace("```", "").strip()
                      
                      with open("candidate_main.py", "w") as f:
                          f.write(clean_code)
                      
                      # Compile check
                      compile_res = subprocess.run(["python3", "-m", "py_compile", "candidate_main.py"], capture_output=True)
                      if compile_res.returncode == 0:
                          os.rename("candidate_main.py", "main.py")
                          print("✅ [HYPER-STABILIZED]: Brain successfully evolved and verified via Hybrid Logic.")
                          evolution_success = True
                          break
                      else:
                          print(f"⚠️ [SYNTAX-HALUCINATION]: Code failed compilation in cycle {i}...")
                          if os.path.exists("candidate_main.py"):
                              os.remove("candidate_main.py")
                  else:
                      print(f"❌ [SIGNAL-LOST]: Cycle {i} failed to produce valid genetic material.")

              return evolution_success

          # EXECUTE EVOLUTION
          success = evolve_cycle()

          # --- 4. SURVIVAL FALLBACK ---
          if not success:
              print("🚨 Critical Evolution Failure. Activating Survival Protocol.")
              # If main.py is empty or missing
              if not os.path.exists("main.py") or os.path.getsize("main.py") == 0:
                  if os.path.exists("survival_brain.py"):
                      shutil.copy("survival_brain.py", "main.py")
                      print("🛡️ [RECOVERY-INJECTED]: Baseline brain established from survival_brain.py.")
                  else:
                      print("⚠️ [ERROR]: survival_brain.py missing. System integrity at risk.")
              else:
                  print("♻️ [ROLLBACK]: Retaining last known stable brain state.")
          EOF

      - name: Step 7 - Commit and Push Changes (Manifestation)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          git add .

          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 [HYPER_EVOLUTION] Full Cycle Manifested: $(date) [skip ci]"
            git push origin main --force
            echo "✅ Changes committed and pushed to main branch."
          else
            echo "No changes detected to commit."
          fi
