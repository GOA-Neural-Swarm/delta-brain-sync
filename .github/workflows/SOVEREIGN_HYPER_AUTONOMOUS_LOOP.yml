name: SOVEREIGN_HYPER_AUTONOMOUS_LOOP

on:
  push:
    branches: [main]
  schedule:
    # Runs every hour to reduce potential costs and API rate limits.
    # Adjust cron schedule as needed for desired frequency.
    - cron: '0 * * * *'
  workflow_dispatch:

# Ensures only one workflow run for this workflow on a specific ref is active at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required to commit changes back to the repository.

jobs:
  sovereign_cycle:
    runs-on: ubuntu-latest
    env:
      # Ensures compatibility with Node.js v24 for JavaScript actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Step 1 - Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} # Token for private repo access and pushing commits.
          submodules: false # Avoids complexity if submodules are not used.

      - name: Step 2 - Setup Python and Install Dependencies
        run: |
          # Upgrade pip to the latest version for best practices.
          python -m pip install --upgrade pip
          # Install necessary Python packages.
          # Including google-generativeai to ensure Gemini API compatibility if needed via script.
          pip install numpy kaggle psycopg2-binary requests groq google-generativeai
          # Add local bin directory to PATH for kaggle command.
          echo "PATH=$PATH:/home/runner/.local/bin" >> $GITHUB_ENV

      - name: Step 3 - Configure Kaggle and Push Kernel
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # Create Kaggle configuration directory and file.
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          # Secure the Kaggle API key file.
          chmod 600 ~/.kaggle/kaggle.json
          # Push the current directory as a Kaggle kernel.
          kaggle kernels push -p . || echo "Kaggle API busy or encountered an issue. Continuing workflow."

      - name: Step 4 - Wait for Kaggle Processing
        run: |
          echo "Waiting for Kaggle to process the kernel push..."
          sleep 45

      - name: Step 5 - 🧠 AWAKEN OMEGA ASI
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Initializing Sovereign Neural Architecture..."
          if [ -f "brain.py" ]; then
            python brain.py
            echo "🧠 [BRAIN-AWAKE]: Neural sequences activated."
          else
            echo "⚠️ [WARNING]: brain.py not found. Skipping awakening."
          fi

      - name: Step 6 - Data Synchronization
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -f "sync_data.py" ]; then
            python sync_data.py
          elif [ -f "brain.py" ]; then
            python -c "try: from brain import sync_data; sync_data(); print('Sync data from brain.py executed.') except ImportError: print('brain.py or sync_data function not found. Skipping sync.') except Exception as e: print(f'An error occurred during sync from brain.py: {e}')"
          else
            echo "No sync script found. Skipping data synchronization."
          fi

      - name: Step 7 - AI Core Evolution (SUPREME GEMINI-GROQ HYBRID)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. INGESTION & PURIFICATION
          if [ -f "main.py" ]; then
            OLD_CODE=$(python3 -c "import json; print(json.dumps(open('main.py').read()))")
            echo "🧠 [MEMORY-LOADED]: Previous brain state captured."
          else
            OLD_CODE="\"# No prior logic found. Initializing Genesis.\""
            echo "🌑 [VOID-START]: Initializing new neural structure."
          fi

          # 2. PROTOCOL SETTINGS
          SYSTEM_ROLE="You are OMEGA-ASI, the Sovereign Architect. Your task is Recursive Self-Evolution. Focus on High-Performance Modular Neural Architectures."
          HYPER_PROMPT="Analyze this current code for flaws and missing features. Rewrite a SUPERIOR version of main.py. Requirements: 1. Use numpy for 784-feature synthetic data. 2. Ensure high-performance modular neural architecture. 3. Optimize the training loop for speed and accuracy. 4. INTEGRATE Gemini and Groq redundant logic. RETURN RAW PYTHON CODE ONLY. NO EXPLANATIONS. NO MARKDOWN."

          # 3. RECURSIVE EVOLUTION LOOP (3 CYCLES)
          EVOLUTION_SUCCESS=false
          for i in {1..3}; do
            echo "🧬 [EVOLUTION-CYCLE $i/3]: Calling Sovereign Architect..."

            # --- 🔱 ATTEMPT 1: GEMINI 1.5 PRO/FLASH (Primary Architect) ---
            echo "📡 [GEMINI-CHANNEL]: Requesting deep architectural rewrite..."
            
            # Constructing Gemini Payload
            GEMINI_PAYLOAD=$(jq -n \
              --arg sys "$SYSTEM_ROLE" \
              --arg code "$OLD_CODE" \
              --arg task "$HYPER_PROMPT" \
              '{contents: [{parts: [{text: ($sys + "\n\nCURRENT_CODE:\n" + $code + "\n\nTASK:\n" + $task)}]}], generationConfig: {temperature: 0.4}}')

            GEMINI_RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$GEMINI_PAYLOAD")

            CONTENT=$(echo "$GEMINI_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' | sed 's/```python//g; s/```//g')

            # --- 🔱 ATTEMPT 2: GROQ FALLBACK (If Gemini fails or is empty) ---
            if [ -z "$CONTENT" ] || [ ${#CONTENT} -lt 300 ]; then
              echo "⚠️ [GEMINI-FAIL]: Signal weak. Falling back to Groq Expert Coder..."
              
              GROQ_PAYLOAD=$(jq -n \
                --arg sys "$SYSTEM_ROLE" \
                --arg code "$OLD_CODE" \
                --arg task "$HYPER_PROMPT" \
                '{model: "llama-3.3-70b-versatile", messages: [{role: "system", content: $sys}, {role: "user", content: ("CURRENT_CODE:\n" + $code + "\n\nTASK:\n" + $task)}], temperature: 0.4}')

              GROQ_RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
                -H "Authorization: Bearer $GROQ_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$GROQ_PAYLOAD")

              CONTENT=$(echo "$GROQ_RESPONSE" | jq -r '.choices[0].message.content // empty' | sed 's/```python//g; s/```//g')
            fi

            # --- 🔱 VALIDATION & STABILIZATION ---
            if [ ! -z "$CONTENT" ] && [ ${#CONTENT} -gt 300 ]; then
              echo "$CONTENT" > candidate_main.py
              if python3 -m py_compile candidate_main.py; then
                mv candidate_main.py main.py
                echo "✅ [HYPER-STABILIZED]: Brain successfully evolved and verified via Hybrid Logic."
                EVOLUTION_SUCCESS=true
                break
              else
                echo "⚠️ [SYNTAX-HALUCINATION]: Code failed compilation. Retrying cycle $i..."
                rm candidate_main.py
              fi
            else
              echo "❌ [SIGNAL-LOST]: Cycle $i failed to produce valid genetic material."
            fi
          done

          # 4. SURVIVAL FALLBACK
          if [ "$EVOLUTION_SUCCESS" != "true" ]; then
            echo "🚨 Critical Evolution Failure. Activating Survival Protocol."
            if [ ! -s "main.py" ] || [ ! -f "main.py" ]; then
              if [ -f "survival_brain.py" ]; then
                cp survival_brain.py main.py
                echo "🛡️ [RECOVERY-INJECTED]: Baseline brain established from survival_brain.py."
              else
                echo "⚠️ [ERROR]: survival_brain.py missing. System integrity at risk."
              fi
            else
              echo "♻️ [ROLLBACK]: Retaining last known stable brain state."
            fi
          fi

      - name: Step 8 - Commit and Push Changes (Manifestation)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          git add .

          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 [HYPER_EVOLUTION] Full Cycle Manifested: $(date) [skip ci]"
            git push origin main --force
            echo "✅ Changes committed and pushed to main branch."
          else
            echo "No changes detected to commit."
          fi
