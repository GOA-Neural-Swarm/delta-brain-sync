name: Sovereign Evolution & Trinity Sync 

on:
  push:
    branches: [main]
    paths:
      - 'kaggle_brain/**'
      - 'app.py'
      - 'main.py'
      - 'brain.py'
      - 'sync_data.py'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evolve_and_sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Step 1 - Checkout Sovereign Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          submodules: false
      
      - name: Step 2 - Environment Setup (Python 3.10 & Node 20)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Step 3 - Global Git Config & Sync Setup
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git config --global pull.rebase false
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Step 4 - Install Multi-Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install websockets==12.0 datasets pandas sqlalchemy psycopg2-binary requests groq sentence-transformers "gradio<6.0.0" python-dotenv huggingface_hub diffusers transformers accelerate bitsandbytes numpy scikit-learn firebase-admin gitpython safetensors Pillow kaggle google-generativeai
          npm install pg @supabase/supabase-js firebase-admin

      - name: Step 5 - Neon Data Sync (Sovereign Mode - FIXED)
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          NEON_KEY: ${{ secrets.NEON_KEY }}
        run: |
          if [ -f "sync_data.py" ]; then
            python sync_data.py
          else
            echo "⚠️ sync_data.py not found, skipping specific Neon sync."
          fi

      - name: Step 6 - Push to Kaggle (The Ironclad Fix)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          mkdir -p kaggle_deploy
          
          # Prioritize kaggle_brain/main.py, then main.py, then brain.py, then app.py
          if [ -f "kaggle_brain/main.py" ]; then
            cp kaggle_brain/main.py kaggle_deploy/main.py
            echo "✅ Found main.py in kaggle_brain/"
          elif [ -f "main.py" ]; then
            cp main.py kaggle_deploy/main.py
          elif [ -f "brain.py" ]; then
            cp brain.py kaggle_deploy/main.py
          elif [ -f "app.py" ]; then
            cp app.py kaggle_deploy/main.py
          else
            echo "❌ Critical Error: No logic file found!" && exit 1
          fi

          cat <<EOF > kaggle_deploy/kernel-metadata.json
          {
            "id": "telefox/delta-brain-sync",
            "title": "delta-brain-sync",
            "code_file": "main.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": [],
            "model_sources": []
          }
          EOF
          
          export PATH=$PATH:/home/runner/.local/bin
          kaggle kernels push -p kaggle_deploy

      - name: Step 7 - Run Evolution Engine (Supreme Gemini-Groq Hybrid)
        timeout-minutes: 15
        env:
          DATABASE_URL: ${{ secrets.NEON_DB_URL }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          NEON_KEY: ${{ secrets.NEON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_URL: ${{ github.repository }}
          HEADLESS_MODE: "true"
        run: |
          # 1. IDENTIFY TARGET
          if [ -f "app.py" ]; then
            TARGET="app.py"
          elif [ -f "main.py" ]; then
            TARGET="main.py"
          else
            echo "Error: No execution target found." && exit 1
          fi

          # 2. CAPTURE CURRENT STATE
          OLD_CODE=$(python3 -c "import json; print(json.dumps(open('$TARGET').read()))")
          SYSTEM_ROLE="You are OMEGA-ASI, the Sovereign Architect. Your task is Recursive Self-Evolution."
          HYPER_PROMPT="Analyze this current code for flaws and missing features. Rewrite a SUPERIOR version of $TARGET. Requirements: 1. Ensure high-performance modular neural architecture. 2. Optimize training/sync loops. 3. Integrate advanced Gemini/Groq redundancy. RETURN RAW PYTHON CODE ONLY. NO EXPLANATIONS. NO MARKDOWN."

          # 3. HYBRID EVOLUTION CYCLE
          echo "🧬 [EVOLUTION]: Initiating Hybrid Gemini-Groq Cycle..."
          
          # --- ATTEMPT 1: GEMINI 2.0 FLASH (Optimized) ---
          GEMINI_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" '{contents: [{parts: [{text: ($sys + "\n\nCURRENT_CODE:\n" + $code + "\n\nTASK:\n" + $task)}]}], generationConfig: {temperature: 0.4, maxOutputTokens: 8192}}')
          GEMINI_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" -H "Content-Type: application/json" -d "$GEMINI_PAYLOAD")
          
          # Clean extraction with printf safely
          CONTENT=$(echo "$GEMINI_RES" | jq -r '.candidates[0].content.parts[0].text // empty' | sed 's/```python//g; s/```//g')

          # --- ATTEMPT 2: GROQ FALLBACK (Increased Max Tokens) ---
          if [ -z "$CONTENT" ] || [ ${#CONTENT} -lt 500 ]; then
            echo "⚠️ [GEMINI-SILENCE/LIMIT]: Falling back to Groq Expert..."
            GROQ_PAYLOAD=$(jq -n --arg sys "$SYSTEM_ROLE" --arg code "$OLD_CODE" --arg task "$HYPER_PROMPT" '{model: "llama-3.3-70b-versatile", messages: [{role: "system", content: $sys}, {role: "user", content: ("CURRENT_CODE:\n" + $code + "\n\nTASK:\n" + $task)}], temperature: 0.4, max_tokens: 4096}')
            GROQ_RES=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" -H "Authorization: Bearer $GROQ_API_KEY" -H "Content-Type: application/json" -d "$GROQ_PAYLOAD")
            CONTENT=$(echo "$GROQ_RES" | jq -r '.choices[0].message.content // empty' | sed 's/```python//g; s/```//g')
          fi

          # 4. VALIDATION & DEPLOYMENT
          if [ ! -z "$CONTENT" ] && [ ${#CONTENT} -gt 500 ]; then
            # Safe write using printf to avoid shell quote issues
            printf "%s\n" "$CONTENT" > candidate.py
            if python3 -m py_compile candidate.py; then
              mv candidate.py "$TARGET"
              echo "✅ [SUCCESS]: $TARGET evolved and verified."
            else
              echo "❌ [STABILITY-ERROR]: Generated code failed syntax check."
            fi
          fi

          # 5. EXECUTION GUARD (With Timeout to prevent 15-min hang)
          echo "Guard: Monitoring $TARGET"
          # 3 မိနစ်အတွင်း အလုပ်မပြီးရင် အတင်းရပ်ခိုင်းထားပါတယ် (Rate Limit loop ကြောင့် hang မနေအောင်)
          timeout 180 python evolution_guard.py "$TARGET" || echo "⚠️ [GUARD-STOPPED]: Process exceeded limit but continuing workflow."

      - name: Step 8 - Run Trinity Sync Engine (Delta Sync)
        env:
          NEON_KEY: ${{ secrets.NEON_KEY }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install axios
          if [ -f "delta_sync.js" ]; then
            node delta_sync.js
          fi

      - name: Optimize Sovereign Repository Structure
        run: |
          # Remove node_modules and sub-repos from git index tracking (does not delete local files)
          git rm -r --cached node_modules || true
          git rm -rf --cached repo_sync || true
          
          # Reconstruct a clean .gitignore to prevent future repository bloat
          cat <<EOF > .gitignore
          node_modules/
          repo_sync/
          __pycache__/
          *.pyc
          .env
          *.log
          kaggle_deploy/
          EOF
          
          echo "✅ Repository structure is now clean and logic remains intact."

      - name: Step 9 - GitHub Auto-Commit
        run: |
          # Add all modified files
          git add .
          
          # Only proceed with commit and push if there are actual changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 Hyper-Autonomous Sync: AI-Modified Core & Brain [skip ci]"
            git fetch origin main
            git reset --soft origin/main
            git push origin main --force
            echo "✅ Changes committed and pushed to main branch."
          else
            echo "No changes to commit. System state is already synchronized."
          fi
