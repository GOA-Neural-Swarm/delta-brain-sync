name: Sovereign Evolution & Trinity Sync

on:
  push:
    branches: [main]
    # [OMNI-TRIGGER]: AI ပြင်သမျှ ဖိုင်တိုင်းကို လက်ခံရန် paths ကန့်သတ်ချက်ကို ဖြုတ်ထားသည်
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'docs/**'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evolve_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Checkout Sovereign Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          # Submodules clash မဖြစ်အောင် မူလအတိုင်း False ထားသည်
          submodules: false
      
      - name: Step 2 - Environment Setup (Python 3.10 & Node 20)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Step 3 - Global Git Config & Sync Setup
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git config --global pull.rebase false
          # Token ဖြင့် Remote URL ကို အသေချာ ချိတ်ဆက်ခြင်း
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Step 4 - Install Multi-Engine Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install datasets pandas sqlalchemy psycopg2-binary requests groq sentence-transformers "gradio<6.0.0" python-dotenv huggingface_hub diffusers transformers accelerate bitsandbytes numpy scikit-learn firebase-admin gitpython safetensors Pillow kaggle
          npm install pg @supabase/supabase-js firebase-admin

      - name: Step 5 - Neon Data Sync (Sovereign Mode - FIXED)
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          NEON_KEY: ${{ secrets.NEON_KEY }}
        run: |
          if [ -f "sync_data.py" ]; then
            python sync_data.py
          else
            echo "⚠️ sync_data.py not found, skipping specific Neon sync."
          fi

      - name: Step 6 - Push to Kaggle (The Fully-Expanded Hybrid Fix)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          mkdir -p kaggle_deploy
          
          # [OMNI-LOGIC]: AI ပြင်လိုက်သော ဖိုင်များရှိပါက ဦးစားပေးရွေးချယ်ခြင်း
          if [ -f "kaggle_brain/main.py" ]; then
            cp kaggle_brain/main.py kaggle_deploy/main.py
            echo "✅ Found main.py in kaggle_brain/"
          elif [ -f "main.py" ]; then
            cp main.py kaggle_deploy/main.py
            echo "✅ Found main.py in root/"
          elif [ -f "brain.py" ]; then
            cp brain.py kaggle_deploy/main.py
          elif [ -f "app.py" ]; then
            cp app.py kaggle_deploy/main.py
          else
            echo "❌ Critical Error: No logic file found!" && exit 1
          fi

          # [HYBRID ASSET SYNC]: Core brain files များကိုပါ Kaggle ဆီ တွဲဖက်ပေးပို့ခြင်း
          [ -f "brain.py" ] && cp brain.py kaggle_deploy/
          [ -f "ai_experiment.py" ] && cp ai_experiment.py kaggle_deploy/
          [ -f "sync_data.py" ] && cp sync_data.py kaggle_deploy/

          cat <<EOF > kaggle_deploy/kernel-metadata.json
          {
            "id": "telefox/delta-brain-sync",
            "title": "delta-brain-sync",
            "code_file": "main.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": [],
            "model_sources": []
          }
          EOF
          
          export PATH=$PATH:/home/runner/.local/bin
          kaggle kernels push -p kaggle_deploy

      - name: Step 7 - Run Evolution Engine (Self-Coding & Ingestion)
        timeout-minutes: 15
        env:
          DATABASE_URL: ${{ secrets.NEON_DB_URL }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          NEON_KEY: ${{ secrets.NEON_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO_URL: ${{ github.repository }}
          HEADLESS_MODE: "true"
        run: |
          if [ -f "app.py" ]; then
            TARGET="app.py"
          elif [ -f "main.py" ]; then
            TARGET="main.py"
          else
            echo "Error: No execution target found." && exit 1
          fi
          
          echo "Guard: Monitoring $TARGET"
          python evolution_guard.py "$TARGET"

      - name: Step 8 - Run Trinity Sync Engine (Delta Sync)
        env:
          NEON_KEY: ${{ secrets.NEON_KEY }}
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -f "delta_sync.js" ]; then
            node delta_sync.js
          fi

      - name: Optimize Sovereign Repository Structure
        run: |
          # [PROTECTION]: Repo ဖောင်းပွမှုကို တားဆီးရန် Cache များအား ရှင်းထုတ်ခြင်း
          git rm -r --cached node_modules || true
          git rm -rf --cached repo_sync || true
          
          cat <<EOF > .gitignore
          node_modules/
          repo_sync/
          __pycache__/
          *.pyc
          .env
          *.log
          kaggle_deploy/
          EOF
          
          echo "✅ Repository structure is now clean and logic remains intact."

      - name: Step 9 - GitHub Sovereign Re-sync (Conflict Killer)
        run: |
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 Hyper-Autonomous Sync: Omni-State Manifested [skip ci]"
            
            # [HYBRID MERGE STRATEGY]: Kaggle ဘက်က Force Push နှင့် မငြိအောင် ညှိနှိုင်းခြင်း
            git fetch origin main
            
            # Rebase လုပ်၍ မရပါက Remote ဘက်က အပြောင်းအလဲကို ဦးစားပေး၍ ပေါင်းစပ်မည်
            git rebase origin/main || git merge -X theirs origin/main
            
            # နောက်ဆုံးအဆင့် Force Push ဖြင့် မူလ Code State ကို ထိန်းသိမ်းခြင်း
            git push origin main --force
            echo "🚀 [SUCCESS]: System state manifested on GitHub."
          else
            echo "No changes to commit. System state is already synchronized."
          fi
