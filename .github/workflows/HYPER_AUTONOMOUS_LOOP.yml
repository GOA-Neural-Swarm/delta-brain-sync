name: SOVEREIGN_HYPER_AUTONOMOUS_LOOP

on:
  push:
    branches: [main]
  schedule:
    # Runs every hour to reduce potential costs and API rate limits.
    # Adjust cron schedule as needed for desired frequency.
    - cron: '0 * * * *'
  workflow_dispatch:

# Ensures only one workflow run for this workflow on a specific ref is active at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required to commit changes back to the repository.

jobs:
  sovereign_cycle:
    runs-on: ubuntu-latest
    env:
      # Ensures compatibility with Node.js v24 for JavaScript actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Step 1 - Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} # Token for private repo access and pushing commits.
          submodules: false # Avoids complexity if submodules are not used.

      - name: Step 2 - Setup Python and Install Dependencies
        run: |
          # Upgrade pip to the latest version for best practices.
          python -m pip install --upgrade pip
          # Install necessary Python packages.
          # Consider using a requirements.txt file for better dependency management.
          pip install kaggle psycopg2-binary requests groq
          # Add local bin directory to PATH for kaggle command.
          # This ensures the 'kaggle' executable is found.
          echo "PATH=$PATH:/home/runner/.local/bin" >> $GITHUB_ENV

      - name: Step 3 - Configure Kaggle and Push Kernel
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # Create Kaggle configuration directory and file.
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          # Secure the Kaggle API key file.
          chmod 600 ~/.kaggle/kaggle.json
          # Push the current directory as a Kaggle kernel.
          # The '|| echo "Kaggle Busy"' handles cases where Kaggle might be temporarily unavailable or busy.
          # Consider adding more robust error handling or retry logic if this is critical.
          kaggle kernels push -p . || echo "Kaggle API busy or encountered an issue. Continuing workflow."

      - name: Step 4 - Wait for Kaggle Processing
        run: |
          echo "Waiting for Kaggle to process the kernel push..."
          # A fixed sleep duration might not be reliable.
          # Consider implementing a check for kernel status if possible, or adjust duration based on typical processing times.
          sleep 45

      - name: Step 5 - Data Synchronization
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Execute sync_data.py if it exists, otherwise attempt to call sync_data from brain.py.
          # The try-except block in the elif condition provides basic error handling for the brain.py import.
          if [ -f "sync_data.py" ]; then
            python sync_data.py
          elif [ -f "brain.py" ]; then
            # Using python -c for a concise inline script.
            # This approach is less readable than a separate script but works for simple calls.
            python -c "try: from brain import sync_data; sync_data(); print('Sync data from brain.py executed.') except ImportError: print('brain.py or sync_data function not found. Skipping sync.') except Exception as e: print(f'An error occurred during sync from brain.py: {e}')"
          else
            echo "No sync script (sync_data.py or brain.py) found. Skipping data synchronization."
          fi

      - name: Step 6 - AI Core Evolution (Self-Reflection & Code Generation)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # 1. INGESTION: Load the current state of the main Python script.
          if [ -f "main.py" ]; then
            OLD_CODE=$(cat main.py)
            echo "🧠 [MEMORY-LOADED]: Previous brain state captured from main.py."
          else
            # Fallback if main.py does not exist, initializing a placeholder.
            OLD_CODE="# No prior logic found. Initializing Genesis."
            echo "🌑 [VOID-START]: Initializing new neural structure."
          fi

          # 2. PROTOCOL SETTINGS: Define the AI's role and the task.
          SYSTEM_ROLE="You are OMEGA-ASI, the Sovereign Architect. Your task is Recursive Self-Evolution."
          HYPER_PROMPT="Analyze this current code for flaws and missing features. Then, rewrite a SUPERIOR version of main.py.
          Requirements:
          1. Use numpy for 784-feature synthetic data.
          2. Ensure high-performance modular neural architecture.
          3. Optimize the training loop for speed and accuracy.
          RETURN RAW PYTHON CODE ONLY. NO EXPLANATIONS. NO MARKDOWN."

          # 3. RECURSIVE EVOLUTION LOOP: Attempt to generate and validate new code up to 3 times.
          EVOLUTION_SUCCESS=false # Flag to track if evolution was successful.
          for i in {1..3}; do
            echo "🧬 [EVOLUTION-CYCLE $i/3]: Reflecting and Re-coding..."

            # Make the API call to Groq for code generation.
            RAW_RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "model": "llama-3.3-70b-versatile",
                "messages": [
                  {"role": "system", "content": "'"$SYSTEM_ROLE"'"},
                  {"role": "user", "content": "CURRENT_CODE:\n'"$OLD_CODE"'\n\nTASK:\n'"$HYPER_PROMPT"'" }
                ],
                "temperature": 0.4
              }')

            # 4. SIGNAL EXTRACTION & PURIFICATION: Parse the AI's response.
            # Use jq to safely extract content, falling back to empty string.
            # Remove markdown code blocks.
            CONTENT=$(echo "$RAW_RESPONSE" | jq -r '.choices[0].message.content // empty' | sed 's/```python//g; s/```//g')

            # 5. SYNTAX GATEKEEPER: Validate the generated code.
            # Check if content is not empty and has a reasonable length.
            if [ ! -z "$CONTENT" ] && [ ${#CONTENT} -gt 350 ]; then
              echo "$CONTENT" > candidate_main.py

              # Attempt to compile the Python code to check for syntax errors.
              if python3 -m py_compile candidate_main.py; then
                # If compilation is successful, move the candidate to main.py.
                mv candidate_main.py main.py
                echo "✅ [HYPER-STABILIZED]: Brain successfully evolved and verified."
                EVOLUTION_SUCCESS=true
                break # Exit loop on successful evolution.
              else
                echo "⚠️ [SYNTAX-HALUCINATION]: Generated code failed compilation. Retrying cycle..."
                # Clean up the invalid candidate file.
                rm candidate_main.py
              fi
            else
              # Log API errors if content is missing or too short.
              ERROR_MSG=$(echo "$RAW_RESPONSE" | jq -c '.error // empty')
              echo "❌ [SIGNAL-LOST]: Evolution failed in cycle $i. API Response Log: $ERROR_MSG"
            fi
          done

          # 6. SURVIVAL FALLBACK: If evolution fails after all cycles, inject a baseline.
          if [ "$EVOLUTION_SUCCESS" != "true" ]; then
            echo "🚨 [CRITICAL]: Evolution sequence failed after multiple attempts. Initiating Survival Protocol."
            # Check if main.py is empty or non-existent.
            if [ ! -s "main.py" ]; then
              # Create a minimal, functional Python script as a fallback.
              cat <<EOF > main.py
import numpy as np
class SurvivalBrain:
    def __init__(self):
        # Initialize weights for a simple neural network.
        self.w = np.random.randn(784, 10)
    def run(self):
        print("ASI Recovery Mode: System Breathing. Baseline brain initialized.")
if __name__ == "__main__":
    SurvivalBrain().run()
EOF
              echo "🛡️ [RECOVERY-INJECTED]: Baseline brain established in main.py."
            else
              echo "♻️ [ROLLBACK]: Retaining last known stable brain state in main.py."
            fi
          fi

      - name: Step 7 - Commit and Push Changes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Re-declare GH_TOKEN for this step.
        run: |
          # Configure Git user for commits.
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          # Set the remote URL to use the GH_TOKEN for authentication.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Add all changes to the staging area.
          git add .

          # Check if there are any staged changes to commit.
          if ! git diff-index --quiet HEAD; then
            # Commit the changes with a descriptive message including the date.
            # '[skip ci]' is appended to prevent triggering another CI build on this commit.
            git commit -m "🧬 [HYPER_EVOLUTION] Full Cycle Manifested: $(date) [skip ci]"
            # Force push the changes to the main branch.
            # Use with caution, as force push overwrites history.
            git push origin main --force
            echo "✅ Changes committed and pushed to main branch."
          else
            echo "No changes detected to commit."
          fi


