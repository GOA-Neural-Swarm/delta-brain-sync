name: Bulk Secret Deletion
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Purge Repository Secrets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }} # PAT Token လိုအပ်ပါတယ်
          script: |
            const TARGET_ORG = "GOA-Neural-Swarm";
            const SECRETS_TO_DELETE = ['FIREBASE_KEY', 'GH_TOKEN', 'NEON_KEY', 'SUPABASE_URL', 'SUPABASE_SERVICE_ROLE_KEY'];

            // 1. Org ထဲမှာရှိတဲ့ repo အားလုံးကို ရှာမယ်
            const repos = await github.paginate(github.rest.repos.listForOrg, {
              org: TARGET_ORG,
              per_page: 100
            });

            const swarmNodes = repos.filter(repo => repo.name.startsWith('swarm-node-'));
            console.log(`🧹 Found ${swarmNodes.length} nodes for deep cleaning...`);

            for (const repo of swarmNodes) {
              console.log(`🧼 Cleaning secrets in ${repo.name}...`);
              for (const secretName of SECRETS_TO_DELETE) {
                try {
                  await github.rest.actions.deleteRepoSecret({
                    owner: TARGET_ORG,
                    repo: repo.name,
                    secret_name: secretName
                  });
                  console.log(`   ✅ Deleted: ${secretName}`);
                } catch (err) {
                  // Secret မရှိရင် (သို့) ဖျက်လို့မရရင် ကျော်သွားမယ်
                  console.log(`   ⏭️ Skipped/Error ${secretName}: ${err.message}`);
                }
              }
            }
            console.log("🏁 MISSION ACCOMPLISHED: ALL NODES ARE PURIFIED.");
