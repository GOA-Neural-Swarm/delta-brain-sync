name: OMEGA MATRIX AUTOMATED EVOLUTION PIPELINE

on:
  # ၁ နာရီခြား တစ်ခါ အလိုအလျောက် ပတ် Run မည့် စနစ် (Cron Job)
  schedule:
    - cron: '0 * * * *'
    
  # ကိုယ်တိုင် manual နှိပ်ပြီး စမ်းချင်ရင်လည်း ရအောင် လုပ်ထားမယ်
  workflow_dispatch:

  # ⚠️ မန်နေဂျာက အော်တို Commit ပြန်တွန်းတဲ့အခါ ပိုက်လိုင်းတွေ ထပ်ခါတလဲလဲ Run ပြီး ထပ်မသွားအောင် push ကို ခဏပိတ်ထားပါသည်
  # push:
  #   branches:
  #     - main

jobs:
  evolve_generation:
    runs-on: ubuntu-latest

    steps:
      # အဆင့် ၁: GitHub Repository ထဲက ကုဒ်တွေကို ဒေါင်းလုဒ်ဆွဲယူခြင်း
      - name: Checkout Repository Context
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Commit ရာဇဝင်အားလုံးကို သန့်သန့်ရှင်းရှင်း ဖတ်နိုင်အောင်

      # အဆင့် ၂: Python Environment ကို အဆင်သင့်ဖြစ်အောင် အောက်ခြေကနေ ပြင်ဆင်ခြင်း
      - name: Setup Pure Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Package အဟောင်းတွေကို အမြန်ပြန်သုံးနိုင်အောင်

      # အဆင့် ၃: အခြေခံ လိုအပ်ချက်များကို အရင် Install လုပ်ခြင်း
      - name: Initialize Core Requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt || echo "Ignoring bootstrap errors, manager will self-heal dependencies."
          fi
          python -m pip install requests # Manager အလုပ်လုပ်ဖို့အတွက် မဖြစ်မနေလိုအပ်သော package

      # အဆင့် ၄: စီမံခန့်ခွဲသူ (Manager) ကုဒ်ကို အမိန့်ပေး အလုပ်စခိုင်းခြင်း
      # ဤနေရာတွင် မင်းရဲ့ GROQ/GEMINI/OPENAI API Key များနှင့် GitHub Token (Secret) များကို အလိုအလျောက် ချိတ်ဆက်ပေးမည်
      - name: Execute Meta-Management & Self-Evolution
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # 👈 ယခုထပ်မံဖြည့်စွက်လိုက်သော OpenAI Key
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          IBM_QUANTUM_TOKEN: ${{ secrets.IBM_QUANTUM_TOKEN }}
        run: |
          python meta_manager.py
