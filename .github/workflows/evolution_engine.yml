name: Evolution Engine

on:
  push:
    paths:
      - 'trigger.lock'
  workflow_dispatch:

# Ensures stability and prevents race conditions during the evolution cycle.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evolve:
    runs-on: ubuntu-latest
    env:
      # Ensures compatibility for JavaScript actions if invoked.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Step 1 - Checkout Source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Step 2 - Hyper-Autonomous Self-Coding (Supreme Gemini-Groq Hybrid)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 1. INGESTION (Capture current state for Recursive Evolution)
          if [ -f "main.py" ]; then
            OLD_CODE=$(python3 -c "import json; print(json.dumps(open('main.py').read()))")
            echo "🧠 [MEMORY-LOADED]: Previous logic captured."
          else
            OLD_CODE="\"# Initial Genesis State\""
          fi

          # 2. PROTOCOL SETTINGS
          SYSTEM_ROLE="You are OMEGA-ASI, the Sovereign Architect. Your task is Recursive Self-Evolution."
          HYPER_PROMPT="You are a Python expert. Rewrite main.py: Generate 100 synthetic samples (784 features), train a model, and print success. Requirements: 1. Use high-performance modular neural architecture. 2. Ensure raw data processing efficiency. OUTPUT ONLY THE FULL PYTHON CODE. NO MARKDOWN. NO EXPLANATIONS."

          # 3. HYBRID EVOLUTION ATTEMPT (GEMINI -> GROQ FALLBACK)
          CONTENT=""

          # --- 🔱 ATTEMPT 1: GEMINI FLASH LATEST (Primary Architect) ---
          echo "📡 [GEMINI-CHANNEL]: Requesting architectural rewrite..."
          
          GEMINI_PAYLOAD=$(jq -n \
            --arg sys "$SYSTEM_ROLE" \
            --arg code "$OLD_CODE" \
            --arg task "$HYPER_PROMPT" \
            '{contents: [{parts: [{text: ($sys + "\n\nCURRENT_CODE:\n" + $code + "\n\nTASK:\n" + $task)}]}], generationConfig: {temperature: 0.2, maxOutputTokens: 4096}}')

          GEMINI_RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GEMINI_PAYLOAD")

          CONTENT=$(echo "$GEMINI_RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty' | sed 's/```python//g; s/```//g; s/\xc2\xa0/ /g')

          # --- 🔱 ATTEMPT 2: GROQ FALLBACK (Fallback Expert) ---
          if [ -z "$CONTENT" ] || [ ${#CONTENT} -le 100 ]; then
            echo "⚠️ [GEMINI-SIGNAL-WEAK]: Falling back to Groq Expert Coder..."
            
            GROQ_PAYLOAD=$(jq -n \
              --arg sys "$SYSTEM_ROLE" \
              --arg code "$OLD_CODE" \
              --arg task "$HYPER_PROMPT" \
              '{model: "llama-3.3-70b-versatile", messages: [{role: "system", content: $sys}, {role: "user", content: ("CURRENT_CODE:\n" + $code + "\n\nTASK:\n" + $task)}], temperature: 0.2, max_tokens: 4096}')

            GROQ_RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$GROQ_PAYLOAD")

            CONTENT=$(echo "$GROQ_RESPONSE" | jq -r '.choices[0].message.content // empty' | sed 's/```python//g; s/```//g; s/\xc2\xa0/ /g')
          fi

          # 4. PARSING, CLEANING & VALIDATION
          if [ ${#CONTENT} -gt 100 ]; then
            echo "$CONTENT" > main_evolved.py
            # Recursive Regex Purification (Removing any lingering markdown or non-ASCII noise)
            python3 -c "import re; raw = open('main_evolved.py').read(); cleaned = re.sub(r'```python\n?|```', '', raw.replace('\xa0', ' ')); cleaned = re.sub(r'[^\x00-\x7F]+', ' ', cleaned); open('main.py', 'w').write(cleaned.strip())"
            
            if python3 -m py_compile main.py; then
              echo "✅ [SUCCESS]: Evolution verified and stabilized."
            else
              echo "❌ [SYNTAX-ERROR]: Evolved code failed verification."
              exit 1
            fi
          else
            echo "❌ [CRITICAL-FAILURE]: No valid logic generated by AI Engines."
            echo "Debug Response: $GEMINI_RESPONSE"
            exit 1
          fi

      - name: Step 3 - Reset Signal and Push (Evolution Lab Manifestation)
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git remote set-url origin "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          
          # Remove the lock to signal completion of the current cycle.
          rm -f trigger.lock
          git add main.py
          
          # Check for changes to prevent empty commits.
          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 [EVOLUTION] Code updated and trigger reset: $(date)"
            # Manifest the evolution in the specific laboratory branch.
            git checkout -B evolution-lab
            git push origin evolution-lab --force
            
            echo "🚀 [SENT]: Logic sent to Evolution Lab for OMEGA Audit."
          else
            echo "No changes detected. System state remains static."
          fi
