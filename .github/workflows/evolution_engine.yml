name: Evolution Engine

on:
  push:
    paths:
      - 'trigger.lock'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Hyper-Autonomous Self-Coding
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # 1. API Request with optimized parameters
          RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "llama-3.3-70b-versatile",
              "messages": [{"role": "user", "content": "You are a Python expert. Rewrite main.py: Generate 100 synthetic samples (784 features), train a model, and print success. Output ONLY the full Python code, no markdown, no conversational text."}],
              "temperature": 0.2,
              "max_tokens": 4096
            }')

          # 2. Content Extraction
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' | sed 's/\xc2\xa0/ /g')

          # 3. Debugging Logic (အမှားရှာရန်)
          if [ ${#CONTENT} -le 20 ]; then
            echo "❌ API Error or Empty Content. Full Response:"
            echo "$RESPONSE"
            exit 1
          fi

          # 4. Parsing & Cleaning
          echo "$CONTENT" > main_evolved.py
          python3 -c "import re; raw = open('main_evolved.py').read(); cleaned = re.sub(r'```python\n?|```', '', raw.replace('\xa0', ' ')); cleaned = re.sub(r'[^\x00-\x7F]+', ' ', cleaned); open('main.py', 'w').write(cleaned.strip())"
          echo "✅ Evolution successful."

      - name: Reset Signal and Push
        run: |
          git config --global user.name 'Sovereign-AI-Bot'
          git config --global user.email 'bot@sovereign.ai'
          git remote set-url origin "https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          
          rm -f trigger.lock
          git add main.py
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "🧬 [EVOLUTION] Code updated and trigger reset: $(date)"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit."
          fi
