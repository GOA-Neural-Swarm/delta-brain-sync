<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Delta Brain Sync</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.54.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="stlite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.54.0/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["numpy", "pandas", "scikit-learn", "pillow", "requests"],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "app.py",
            },
            "brain.py": {
              url: "brain.py",
            },
            "logo.png": {
              url: "logo.png",
            }
          },
        },
        document.getElementById("stlite")
      );
    </script>
  </body>
</html>
