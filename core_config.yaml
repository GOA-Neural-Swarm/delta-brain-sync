database_trinity:
  firebase_realtime_firestore:
    collections:
    - path: TELEFOXx/AI_Evolution/Gen_{gen}
    - path: TELEFOXx/Health_Monitor/Gen_{gen}
    - path: cluster_nodes
    - path: neurons
  neon_postgres:
    max_overflow: 30
    pool_size: 15
    pool_timeout: 60
    sslmode: verify-full
    tables:
    - name: genesis_pipeline
      schema: id SERIAL PRIMARY KEY, science_domain TEXT, title TEXT, detail TEXT,
        energy_stability FLOAT, master_sequence TEXT
    - name: ai_thoughts
      schema: id SERIAL PRIMARY KEY, thought TEXT, gen_version INTEGER, timestamp
        TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    - name: intelligence_core
      schema: module_name TEXT PRIMARY KEY, logic_data JSONB
    - name: neurons
      schema: id SERIAL PRIMARY KEY, data JSONB
  supabase_vector_vault:
    tables:
    - columns:
      - gen_id
      - status
      - thought_process
      - neural_weight
      - synapse_code
      - timestamp
      - asi_score
      name: dna_vault
    - columns:
      - id
      - data
      - synced_at
      name: neurons
